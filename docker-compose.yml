services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s


  consumer:
    build: .
    container_name: consumer
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./consumer:/app
    working_dir: /app
    env_file:
      - ./consumer/.env
    network_mode: "host"
    command: ["python", "consumer.py"]

  producer:
    build: .
    container_name: producer
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./producer:/app
    working_dir: /app
    network_mode: "host"
    command: ["python", "producer.py"]

